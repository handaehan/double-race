<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    PWA 홈화면 아이콘 — 투자 레이스
    상승 곡선 두 개가 교차하는 모티프 (S&P500 vs 코스피 등 비교 시뮬레이션 아이덴티티)
    iOS Safari 는 SVG apple-touch-icon 을 일부 버전에서만 지원 — PNG 변환본 권장.
    icons/icon-192.png, icons/icon-512.png 로 변환해서 같이 두면 더 안전.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- 배경: iOS 가 자동 라운드 마스킹하므로 풀-블리드 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 좌하단 0,0 기준 grid 가이드 (보조) -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="80" y1="120" x2="432" y2="120"/>
    <line x1="80" y1="220" x2="432" y2="220"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
  </g>

  <!-- 곡선 1 (핑크→옐로) — 강한 상승 -->
  <path d="M80 410 C 160 380, 220 320, 280 220 S 400 80, 432 80"
        fill="none" stroke="url(#line1)" stroke-width="28"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 곡선 2 (블루→그린) — 완만 상승 -->
  <path d="M80 410 C 180 380, 260 340, 320 280 S 410 220, 432 200"
        fill="none" stroke="url(#line2)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.95"/>

  <!-- 끝점 마커 -->
  <circle cx="432" cy="80" r="22" fill="#FFD54F" stroke="#fff" stroke-width="6"/>
  <circle cx="432" cy="200" r="18" fill="#4FC3F7" stroke="#fff" stroke-width="5"/>
</svg>
